name: Deploy frontend

# Required: Secret: AZURE_STATIC_WEB_APPS_API_TOKEN  (az staticwebapp secrets list ...)
#           Variable: BACKEND_URL  (https://<backend-app>.<region>.azurecontainerapps.io)

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Build static export
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.BACKEND_URL }}
        run: npm run build # emits frontend/out (output: "export")

      - name: Deploy to Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: upload
          app_location: "frontend/out"
          skip_app_build: true
          skip_api_build: true
